<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Meerim Visionary Training - Apply Now">
    <title>Apply Now - Meerim Visionary Training</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== LUXURY DESIGN SYSTEM ===== */
        :root {
            --primary: #52C4DC;
            --accent: #C9A24A;
            --success: #4ade80;
            --bg-dark: #0A0E1A;
            --bg-grad: linear-gradient(135deg, #0A0E1A 0%, #1A2332 50%, #0F1419 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-strong: rgba(255, 255, 255, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: #B8C5D1;
            --text-muted: #7A8B99;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.5);
            --border-radius: 16px;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-fast: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-grad);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== BACK TO HOME BUTTON ===== */
        .back-to-home {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--glass-strong);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--shadow-soft);
            cursor: pointer;
        }

        .back-to-home:hover {
            transform: translateY(-3px);
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: var(--shadow-strong);
            color: #FFFFFF;
        }

        .back-to-home i {
            font-size: 1.2rem;
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-strong);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            z-index: 1001;
            box-shadow: var(--shadow-soft);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--primary);
            border-color: var(--primary);
        }

        .theme-toggle i {
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        /* ===== FORM CONTAINER ===== */
        .form-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 3rem;
            box-shadow: var(--shadow-strong);
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        /* ===== FORM HEADER ===== */
        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            text-transform: capitalize;
        }

        .form-label i {
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition-fast);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(82, 196, 220, 0.1);
        }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: #FFFFFF;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(82, 196, 220, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(82, 196, 220, 0.5);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn i {
            font-size: 1.2rem;
        }

        /* ===== FLASH MESSAGES ===== */
        .flash-messages {
            position: fixed;
            top: 6rem;
            right: 2rem;
            z-index: 1002;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
        }

        .flash-message {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: var(--glass-strong);
            backdrop-filter: blur(20px);
            border: 2px solid;
            box-shadow: var(--shadow-strong);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        .flash-message.success {
            border-color: var(--success);
            background: rgba(74, 222, 128, 0.1);
        }

        .flash-message.error {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .flash-message i {
            font-size: 1.5rem;
        }

        .flash-message.success i {
            color: var(--success);
        }

        .flash-message.error i {
            color: #f87171;
        }

        .flash-content {
            flex: 1;
        }

        .flash-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            transition: var(--transition-fast);
        }

        .flash-close:hover {
            color: var(--text-primary);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== LIGHT MODE ===== */
        :root.light-mode {
            --primary: #2563EB;
            --accent: #DC2626;
            --success: #22c55e;
            --bg-dark: #FAFAFA;
            --bg-grad: linear-gradient(135deg, #FAFAFA 0%, #F1F5F9 50%, #E2E8F0 100%);
            --glass: rgba(255, 255, 255, 0.8);
            --glass-strong: rgba(255, 255, 255, 0.9);
            --text-primary: #0F172A;
            --text-secondary: #334155;
            --text-muted: #64748B;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        :root.light-mode .form-container {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        :root.light-mode .form-input {
            background: rgba(0, 0, 0, 0.03);
            border: 2px solid rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
        }

        :root.light-mode .form-input:focus {
            background: rgba(0, 0, 0, 0.05);
        }

        :root.light-mode .back-to-home,
        :root.light-mode .theme-toggle {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }

            .form-container {
                padding: 2rem 1.5rem;
            }

            .form-title {
                font-size: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .back-to-home {
                top: 1rem;
                left: 1rem;
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .theme-toggle {
                top: 1rem;
                right: 1rem;
                width: 45px;
                height: 45px;
            }

            .flash-messages {
                top: 5rem;
                right: 1rem;
                left: 1rem;
                max-width: none;
            }
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 1.5rem 1rem;
            }

            .form-title {
                font-size: 1.75rem;
            }

            .form-subtitle {
                font-size: 0.9rem;
            }

            .back-to-home span {
                display: none;
            }

            .submit-btn {
                font-size: 1rem;
                padding: 0.875rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- Back to Home Button -->
<a href="/" class="back-to-home">
    <i class="fas fa-arrow-left"></i>
    <span>Back to Home</span>
</a>

<!-- Theme Toggle Button -->
<button class="theme-toggle" id="themeToggle">
    <i class="fas fa-moon" id="themeIcon"></i>
</button>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-messages" id="flashMessages">
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">
                    {% if category == 'success' %}
                        <i class="fas fa-check-circle"></i>
                    {% else %}
                        <i class="fas fa-exclamation-circle"></i>
                    {% endif %}
                    <div class="flash-content">{{ message }}</div>
                    <button class="flash-close" onclick="this.parentElement.remove()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

<!-- Form Container -->
<div class="form-container">
    <div class="form-header">
        <h1 class="form-title">Apply Now</h1>
        <p class="form-subtitle">Join our world-class training programs</p>
    </div>

    <form action="{{ url_for('apply') }}" method="post">
        <!-- Name Row -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="first_name">
                    <i class="fas fa-user"></i> First Name
                </label>
                <input 
                    class="form-input" 
                    type="text" 
                    id="first_name" 
                    name="first_name" 
                    placeholder="Enter your first name"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label" for="last_name">
                    <i class="fas fa-user"></i> Last Name
                </label>
                <input 
                    class="form-input" 
                    type="text" 
                    id="last_name" 
                    name="last_name" 
                    placeholder="Enter your last name"
                    required>
            </div>
        </div>

        <!-- Contact Row -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="contact_number">
                    <i class="fas fa-phone"></i> Contact Number
                </label>
                <input 
                    class="form-input" 
                    type="tel" 
                    id="contact_number" 
                    name="contact_number" 
                    placeholder="+971 XX XXX XXXX"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label" for="company_name">
                    <i class="fas fa-building"></i> Company Name
                </label>
                <input 
                    class="form-input" 
                    type="text" 
                    id="company_name" 
                    name="company_name" 
                    placeholder="Enter your company name"
                    required>
            </div>
        </div>

        <!-- Email & Training Row -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input 
                    class="form-input" 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your.email@example.com"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label" for="training_program">
                    <i class="fas fa-graduation-cap"></i> Training Program
                </label>
                <input 
                    class="form-input" 
                    type="text" 
                    id="training_program" 
                    name="training_program" 
                    placeholder="Desired training program"
                    required>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane"></i>
            Submit Application
        </button>
    </form>
</div>

<script>
// Theme Toggle Functionality
function initThemeToggle() {
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const root = document.documentElement;
    const currentTheme = localStorage.getItem('theme') || 'dark';
    
    if (currentTheme === 'light') {
        root.classList.add('light-mode');
        themeIcon.className = 'fas fa-sun';
    } else {
        root.classList.remove('light-mode');
        themeIcon.className = 'fas fa-moon';
    }
    
    themeToggle.addEventListener('click', function() {
        if (root.classList.contains('light-mode')) {
            root.classList.remove('light-mode');
            themeIcon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'dark');
        } else {
            root.classList.add('light-mode');
            themeIcon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'light');
        }
    });
}

// Auto-hide flash messages after 5 seconds
function autoHideFlashMessages() {
    const flashMessages = document.querySelectorAll('.flash-message');
    flashMessages.forEach(message => {
        setTimeout(() => {
            message.style.animation = 'slideIn 0.3s ease-out reverse';
            setTimeout(() => message.remove(), 300);
        }, 5000);
    });
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    initThemeToggle();
    autoHideFlashMessages();
});
</script>

</body>
</html>

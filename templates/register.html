<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Meerim Visionary Training - Register">
    <title>Register - Meerim Visionary Training</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== LUXURY DESIGN SYSTEM ===== */
        :root {
            --primary: #52C4DC;
            --accent: #C9A24A;
            --bg-dark: #0A0E1A;
            --bg-grad: linear-gradient(135deg, #0A0E1A 0%, #1A2332 50%, #0F1419 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-strong: rgba(255, 255, 255, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: #B8C5D1;
            --text-muted: #7A8B99;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.5);
            --border-radius: 16px;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-fast: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-grad);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== BACK TO HOME BUTTON ===== */
        .back-to-home {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--glass-strong);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--shadow-soft);
        }

        .back-to-home:hover {
            transform: translateY(-3px);
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: var(--shadow-strong);
            color: #FFFFFF;
        }

        .back-to-home i {
            font-size: 1.2rem;
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-strong);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            z-index: 1001;
            box-shadow: var(--shadow-soft);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--primary);
            border-color: var(--primary);
        }

        .theme-toggle i {
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        /* ===== FORM CONTAINER ===== */
        .form-container {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 3rem;
            box-shadow: var(--shadow-strong);
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== FORM STYLES ===== */
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: capitalize;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(82, 196, 220, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(82, 196, 220, 0.3);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(82, 196, 220, 0.5);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* ===== FLASH MESSAGES ===== */
        .flash-container {
            position: fixed;
            top: 6rem;
            right: 2rem;
            z-index: 9999;
            max-width: 400px;
        }

        .flash-message {
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .flash-message.success {
            background: rgba(56, 193, 114, 0.2);
            border: 2px solid rgba(56, 193, 114, 0.5);
            color: #4ade80;
        }

        .flash-message.warning {
            background: rgba(245, 158, 11, 0.2);
            border: 2px solid rgba(245, 158, 11, 0.5);
            color: #fbbf24;
        }

        .flash-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
        }

        .close-btn {
            margin-left: 1rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.5rem;
            color: inherit;
            opacity: 0.7;
            transition: var(--transition-fast);
        }

        .close-btn:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        /* ===== LOGIN LINK ===== */
        .auth-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
        }

        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-fast);
        }

        .auth-link a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* ===== LIGHT MODE ===== */
        :root.light-mode {
            --primary: #2563EB;
            --accent: #DC2626;
            --bg-dark: #FAFAFA;
            --bg-grad: linear-gradient(135deg, #FAFAFA 0%, #F1F5F9 50%, #E2E8F0 100%);
            --glass: rgba(255, 255, 255, 0.8);
            --glass-strong: rgba(255, 255, 255, 0.9);
            --text-primary: #0F172A;
            --text-secondary: #334155;
            --text-muted: #64748B;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        :root.light-mode .form-container {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        :root.light-mode .form-input {
            background: rgba(0, 0, 0, 0.03);
            border: 2px solid rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
        }

        :root.light-mode .form-input:focus {
            background: rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        :root.light-mode .back-to-home,
        :root.light-mode .theme-toggle {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .form-container {
                padding: 2rem 1.5rem;
            }

            .form-title {
                font-size: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .back-to-home {
                top: 1rem;
                left: 1rem;
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .theme-toggle {
                top: 1rem;
                right: 1rem;
                width: 45px;
                height: 45px;
            }

            .flash-container {
                top: 5rem;
                right: 1rem;
                left: 1rem;
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }

            .form-container {
                padding: 1.5rem 1rem;
            }

            .form-title {
                font-size: 1.75rem;
            }

            .back-to-home span {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- Back to Home Button -->
<a href="/" class="back-to-home">
    <i class="fas fa-arrow-left"></i>
    <span>Back to Home</span>
</a>

<!-- Theme Toggle Button -->
<button class="theme-toggle" id="themeToggle">
    <i class="fas fa-moon" id="themeIcon"></i>
</button>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-container">
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">
                    {{ message }}
                    <span class="close-btn" onclick="this.parentElement.style.display='none';">&times;</span>
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

<!-- Form Container -->
<div class="form-container">
    <h2 class="form-title">Register</h2>
    <form action="{{ url_for('register') }}" method="post">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">First Name</label>
                <input class="form-input" type="text" name="first_n" placeholder="Enter first name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Last Name</label>
                <input class="form-input" type="text" name="last_n" placeholder="Enter last name" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-input" type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" name="password" placeholder="Create a password" required>
            </div>
        </div>
        <button class="submit-btn" type="submit">
            <i class="fas fa-user-plus"></i> Register
        </button>
    </form>
    <div class="auth-link">
        Already have an account? <a href="/login">Log In</a>
    </div>
</div>

<script>
// Theme Toggle Functionality
function initThemeToggle() {
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const root = document.documentElement;
    const currentTheme = localStorage.getItem('theme') || 'dark';
    
    if (currentTheme === 'light') {
        root.classList.add('light-mode');
        themeIcon.className = 'fas fa-sun';
    } else {
        root.classList.remove('light-mode');
        themeIcon.className = 'fas fa-moon';
    }
    
    themeToggle.addEventListener('click', function() {
        if (root.classList.contains('light-mode')) {
            root.classList.remove('light-mode');
            themeIcon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'dark');
        } else {
            root.classList.add('light-mode');
            themeIcon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'light');
        }
    });
}

// Auto-hide flash messages
setTimeout(() => {
    const flashes = document.querySelectorAll('.flash-message');
    flashes.forEach(flash => {
        flash.style.opacity = '0';
        flash.style.transform = 'translateX(100%)';
        setTimeout(() => flash.style.display = 'none', 300);
    });
}, 5000);

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    initThemeToggle();
});
</script>

</body>
</html>
